<!DOCTYPE html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Mobile Menu Safari Fix</title>

    <style>
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        background: #f5f5f5;
      }

      body.menu-open {
        overflow: hidden;
        touch-action: none;
      }

      .site-header {
        position: sticky;
        top: 0;
        z-index: 1000;
        height: 60px;
        display: flex;
        align-items: center;
        padding: 0 16px;
        background: #111;
        color: #fff;
      }

      .menu-toggle {
        border: 0;
        background: transparent;
        color: #fff;
        width: 44px;
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }

      .hamburger {
        width: 24px;
        height: 18px;
        position: relative;
      }

      .hamburger span {
        position: absolute;
        width: 100%;
        height: 2px;
        background: #fff;
        left: 0;
      }

      .hamburger span:nth-child(1) {
        top: 0;
      }

      .hamburger span:nth-child(2) {
        top: 8px;
      }

      .hamburger span:nth-child(3) {
        top: 16px;
      }

      .brand {
        font-size: 18px;
        font-weight: bold;
        margin-left: 10px;
      }

      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.3s ease;
        z-index: 999;
      }

      .overlay.active {
        opacity: 1;
        visibility: visible;
      }

      .mobile-drawer {
        position: fixed;
        top: 0;
        left: 0;
        width: min(80vw, 300px);
        height: 100vh;
        height: 100dvh;
        max-height: 100vh;
        max-height: 100dvh;
        background: #fff;
        box-shadow: 2px 0 20px rgba(0, 0, 0, 0.2);
        transform: translate3d(-100%, 0, 0);
        -webkit-transform: translate3d(-100%, 0, 0);
        transition: transform 0.3s ease;
        -webkit-transition: -webkit-transform 0.3s ease;
        z-index: 1001;
        display: flex;
        flex-direction: column;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        padding-bottom: env(safe-area-inset-bottom);
      }

      .mobile-drawer.open {
        transform: translate3d(0, 0, 0);
        -webkit-transform: translate3d(0, 0, 0);
      }

      .drawer-header {
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        border-bottom: 1px solid #eee;
      }

      .close-menu {
        font-size: 26px;
        border: none;
        background: none;
        cursor: pointer;
      }

      .mobile-nav a {
        display: block;
        padding: 16px;
        border-bottom: 1px solid #eee;
        text-decoration: none;
        color: #111;
      }

      .mobile-nav a:hover {
        background: #f7f7f7;
      }

      .page-content {
        padding: 20px;
        min-height: 200vh;
      }

      @supports (padding: max(0px)) {
        .site-header {
          padding-left: max(16px, env(safe-area-inset-left));
          padding-right: max(16px, env(safe-area-inset-right));
        }

        .mobile-drawer {
          padding-left: env(safe-area-inset-left);
        }
      }
    </style>
  </head>

  <body>
    <header class="site-header">
      <button id="menuBtn" class="menu-toggle">
        <div class="hamburger">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </button>
      <div class="brand">Logo</div>
    </header>

    <aside id="drawer" class="mobile-drawer">
      <div class="drawer-header">
        <strong>Meniu</strong>
        <button id="closeBtn" class="close-menu">&times;</button>
      </div>

      <nav class="mobile-nav">
        <a href="#">Acasa</a>
        <a href="#">Despre</a>
        <a href="#">Servicii</a>
        <a href="#">Portofoliu</a>
        <a href="#">Contact</a>
      </nav>
    </aside>

    <div id="overlay" class="overlay"></div>

    <main class="page-content">
      <h1>Test Safari</h1>
      <p>Deschide meniul din stanga.</p>
      <p>Overlay-ul ar trebui sa fie perfect pe Safari acum.</p>
    </main>

    <script>
      const menuBtn = document.getElementById("menuBtn");
      const closeBtn = document.getElementById("closeBtn");
      const drawer = document.getElementById("drawer");
      const overlay = document.getElementById("overlay");
      const body = document.body;

      function openMenu() {
        drawer.classList.add("open");
        overlay.classList.add("active");
        body.classList.add("menu-open");
      }

      function closeMenu() {
        drawer.classList.remove("open");
        overlay.classList.remove("active");
        body.classList.remove("menu-open");
      }

      menuBtn.addEventListener("click", openMenu);
      closeBtn.addEventListener("click", closeMenu);
      overlay.addEventListener("click", closeMenu);

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeMenu();
      });
    </script>
  </body>
</html>
