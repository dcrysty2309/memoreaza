<!DOCTYPE html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Mobile Menu Safari Friendly</title>
    <style>
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        background: #f5f5f5;
      }

      body.menu-open {
        overflow: hidden;
        touch-action: none;
      }

      .site-header {
        position: sticky;
        top: 0;
        z-index: 1000;
        height: 60px;
        display: flex;
        align-items: center;
        padding: 0 16px;
        background: #111;
        color: #fff;
      }

      .menu-toggle {
        appearance: none;
        -webkit-appearance: none;
        border: 0;
        background: transparent;
        color: #fff;
        width: 44px;
        height: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        padding: 0;
        margin-right: 12px;
      }

      .menu-toggle:focus-visible,
      .close-menu:focus-visible,
      .mobile-nav a:focus-visible {
        outline: 2px solid #4da3ff;
        outline-offset: 2px;
      }

      .hamburger {
        position: relative;
        width: 24px;
        height: 18px;
        display: block;
      }

      .hamburger span {
        position: absolute;
        left: 0;
        width: 100%;
        height: 2px;
        background: #fff;
        border-radius: 2px;
        transition: transform 0.3s ease, opacity 0.3s ease;
        -webkit-transition: -webkit-transform 0.3s ease, opacity 0.3s ease;
      }

      .hamburger span:nth-child(1) {
        top: 0;
      }

      .hamburger span:nth-child(2) {
        top: 8px;
      }

      .hamburger span:nth-child(3) {
        top: 16px;
      }

      .brand {
        font-size: 18px;
        font-weight: 700;
      }

      .page-content {
        padding: 24px 16px 80px;
        min-height: 200vh;
      }

      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition: opacity 0.3s ease, visibility 0.3s ease;
        -webkit-transition: opacity 0.3s ease, visibility 0.3s ease;
        z-index: 999;
      }

      .overlay.active {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
      }

      .mobile-drawer {
        position: fixed;
        top: 0;
        left: 0;
        width: min(85vw, 320px);
        height: 100dvh;
        height: 100vh;
        background: #fff;
        box-shadow: 2px 0 20px rgba(0, 0, 0, 0.2);
        transform: translate3d(-100%, 0, 0);
        -webkit-transform: translate3d(-100%, 0, 0);
        transition: transform 0.32s ease;
        -webkit-transition: -webkit-transform 0.32s ease;
        will-change: transform;
        z-index: 1001;
        display: flex;
        flex-direction: column;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }

      .mobile-drawer.open {
        transform: translate3d(0, 0, 0);
        -webkit-transform: translate3d(0, 0, 0);
      }

      .drawer-header {
        min-height: 60px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        border-bottom: 1px solid #e5e5e5;
        background: #fff;
        position: sticky;
        top: 0;
      }

      .drawer-title {
        font-size: 18px;
        font-weight: 700;
        color: #111;
      }

      .close-menu {
        appearance: none;
        -webkit-appearance: none;
        border: 0;
        background: transparent;
        font-size: 28px;
        line-height: 1;
        cursor: pointer;
        width: 44px;
        height: 44px;
      }

      .mobile-nav {
        padding: 12px 0;
      }

      .mobile-nav a {
        display: block;
        padding: 14px 16px;
        color: #111;
        text-decoration: none;
        border-bottom: 1px solid #f1f1f1;
        font-size: 16px;
      }

      .mobile-nav a:hover,
      .mobile-nav a:active {
        background: #f7f7f7;
      }

      @supports (padding: max(0px)) {
        .site-header {
          padding-left: max(16px, env(safe-area-inset-left));
          padding-right: max(16px, env(safe-area-inset-right));
        }

        .mobile-drawer {
          padding-left: env(safe-area-inset-left);
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <button
        class="menu-toggle"
        id="menuToggle"
        aria-label="Deschide meniul"
        aria-expanded="false"
        aria-controls="mobileDrawer"
        type="button"
      >
        <span class="hamburger" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </span>
      </button>

      <div class="brand">Logo</div>
    </header>

    <aside class="mobile-drawer" id="mobileDrawer" aria-hidden="true">
      <div class="drawer-header">
        <div class="drawer-title">Meniu</div>
        <button class="close-menu" id="closeMenu" aria-label="Inchide meniul" type="button">
          &times;
        </button>
      </div>

      <nav class="mobile-nav">
        <a href="#">Acasa</a>
        <a href="#">Despre</a>
        <a href="#">Servicii</a>
        <a href="#">Portofoliu</a>
        <a href="#">Contact</a>
      </nav>
    </aside>

    <div class="overlay" id="overlay"></div>

    <main class="page-content">
      <h1>Pagina demo</h1>
      <p>Apasa pe hamburger ca sa deschizi meniul din stanga.</p>
      <p>Overlay-ul acopera restul paginii, iar meniul intra cu slide.</p>
      <p>Codul este facut sa fie stabil si pe Safari iPhone.</p>
    </main>

    <script>
      (function () {
        var body = document.body;
        var menuToggle = document.getElementById("menuToggle");
        var closeMenuBtn = document.getElementById("closeMenu");
        var drawer = document.getElementById("mobileDrawer");
        var overlay = document.getElementById("overlay");
        var focusableSelectors = 'a[href], button:not([disabled]), [tabindex]:not([tabindex="-1"])';
        var lastFocusedElement = null;

        function getFocusableElements() {
          return drawer.querySelectorAll(focusableSelectors);
        }

        function openMenu() {
          lastFocusedElement = document.activeElement;

          drawer.classList.add("open");
          overlay.classList.add("active");
          body.classList.add("menu-open");

          drawer.setAttribute("aria-hidden", "false");
          menuToggle.setAttribute("aria-expanded", "true");

          var focusable = getFocusableElements();
          if (focusable.length) {
            focusable[0].focus();
          }
        }

        function closeMenu() {
          drawer.classList.remove("open");
          overlay.classList.remove("active");
          body.classList.remove("menu-open");

          drawer.setAttribute("aria-hidden", "true");
          menuToggle.setAttribute("aria-expanded", "false");

          if (lastFocusedElement) {
            lastFocusedElement.focus();
          } else {
            menuToggle.focus();
          }
        }

        function trapFocus(e) {
          if (!drawer.classList.contains("open") || e.key !== "Tab") return;

          var focusable = getFocusableElements();
          if (!focusable.length) return;

          var first = focusable[0];
          var last = focusable[focusable.length - 1];

          if (e.shiftKey && document.activeElement === first) {
            e.preventDefault();
            last.focus();
          } else if (!e.shiftKey && document.activeElement === last) {
            e.preventDefault();
            first.focus();
          }
        }

        menuToggle.addEventListener("click", openMenu);
        closeMenuBtn.addEventListener("click", closeMenu);
        overlay.addEventListener("click", closeMenu);

        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape" && drawer.classList.contains("open")) {
            closeMenu();
          }
          trapFocus(e);
        });

        var navLinks = drawer.querySelectorAll("a");
        navLinks.forEach(function (link) {
          link.addEventListener("click", closeMenu);
        });
      })();
    </script>
  </body>
</html>
